<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cluedo Tracker</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🕵️‍♂️</text></svg>">
    
    <style>
        :root { --gold: #d4af37; --glass: rgba(0, 0, 0, 0.9); --blood: #8b0000; }
        
        body { 
            font-family: 'Georgia', serif; margin: 0; padding: 0; min-height: 100dvh;
            background-color: #1a1a1a; overflow-x: hidden; color: #eee;
        }

        #bg-layer {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1; background-size: cover; background-position: center;
            transition: filter 0.3s ease;
        }

        /* Responsive Header Logic */
        #ui-fixed-header {
            position: sticky; top: 0; z-index: 999;
            background: var(--glass); padding: 10px;
            border-bottom: 1px solid var(--gold);
        }

        .header-content, .container { 
            width: 100%; 
            max-width: 100%; 
            margin: auto; 
            transition: filter 0.4s ease, opacity 0.4s ease; 
        }

        /* Desktop Breakpoint: Constrain width for large screens */
        @media (min-width: 800px) {
            .header-content, .container {
                max-width: 800px;
                border-left: 1px solid #333;
                border-right: 1px solid #333;
                box-shadow: 0 0 50px rgba(0,0,0,0.8);
            }
            #ui-fixed-header { padding: 15px 0; }
        }

        .secret-blur { filter: blur(50px) grayscale(1) !important; opacity: 0 !important; pointer-events: none !important; }

        .secret-header { display: flex; justify-content: space-between; align-items: center; padding: 0 10px; }
        .switch { position: relative; display: inline-block; width: 40px; height: 20px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #333; transition: .4s; border-radius: 20px; border: 1px solid var(--gold); }
        .slider:before { position: absolute; content: ""; height: 12px; width: 12px; left: 4px; bottom: 3px; background-color: var(--gold); transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: var(--blood); }
        input:checked + .slider:before { transform: translateX(18px); background-color: #fff; }

        .hud-actions { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin: 10px; }
        .btn { padding: 10px; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; text-transform: uppercase; font-size: 0.7rem; }
        .btn-win { background: #28a745; color: white; }
        .btn-lose { background: var(--blood); color: white; }

        /* GRID SYSTEM */
        .setup { display: grid; grid-template-columns: 30% repeat(6, 10%) 10%; width: 100%; background: #000; }
        .setup-label { color: var(--gold); font-size: 0.55em; align-self: center; padding-left: 8px; font-weight: bold; }
        .setup input { 
            background: transparent; border: none; border-left: 1px solid #333; color: var(--gold); 
            padding: 12px 0; text-align: center; font-size: 0.7em; font-weight: bold; text-transform: uppercase; width: 100%; outline: none;
        }

        table { width: 100%; border-collapse: collapse; background: var(--glass); table-layout: fixed; border: none; }
        th, td { border: 1px solid rgba(255,255,255,0.08); padding: 15px 0; text-align: center; }
        .name-col { width: 30%; text-align: left; padding-left: 10px; color: var(--gold); font-size: 0.75em; font-weight: bold; border-left: none; }
        .player-col { width: 10%; font-size: 0.55em; text-transform: uppercase; color: #888; }
        .file-col { width: 10%; color: #444; font-size: 0.55em; border-right: none; background: rgba(255,255,255,0.02); }

        .cell { cursor: pointer; user-select: none; font-weight: bold; font-size: 1.1em; }
        .state-x { color: #ff4d4d; }
        .state-maybe { color: var(--gold); }
        .state-check { color: #00ff88; }

        .section-header { 
            background: linear-gradient(to right, #8b0000, #200); color: var(--gold); 
            padding: 8px 10px; font-weight: bold; text-transform: uppercase; 
            border-top: 1px solid var(--gold); border-bottom: 1px solid var(--gold); font-size: 0.75em;
        }
        
        textarea { width: calc(100% - 20px); height: 80px; background: rgba(0,0,0,0.5); color: #ccc; border: 1px solid #333; padding: 10px; margin: 10px; border-radius: 4px; resize: none; font-size: 0.8em; }
        .overlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100dvh; display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 9999; text-align: center; padding: 20px; box-sizing: border-box; backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); background: rgba(0,0,0,0.8); }
        footer { text-align: center; padding: 20px; color: #444; font-size: 0.6em; }
    </style>
</head>
<body>

<div id="bg-layer"></div>

<div id="ui-fixed-header">
    <div class="header-content">
        <div class="secret-header">
            <strong style="color:var(--gold); font-size: 0.8em;">INVESTIGATOR HUD</strong>
            <div style="display: flex; align-items: center; gap: 8px;">
                <span style="font-size: 0.55em; letter-spacing: 1px; color: #888;">STEALTH MODE</span>
                <label class="switch">
                    <input type="checkbox" id="secret-toggle" onchange="toggleSecret(this.checked)">
                    <span class="slider"></span>
                </label>
            </div>
        </div>
        <div class="hud-actions">
            <button class="btn btn-win" onclick="triggerEnd('win')">SOLVE ✔</button>
            <button class="btn btn-lose" onclick="triggerEnd('kill')">GUESS WRONG 💀</button>
        </div>
        <div style="display: flex; align-items: center; gap: 10px; padding: 0 10px;">
            <input type="range" id="blur-slider" min="0" max="25" value="0" style="flex-grow:1" oninput="updateBlur(this.value)">
            <button class="btn" style="padding:4px 10px; background:#222; color:var(--gold); border:1px solid var(--gold);" onclick="document.getElementById('local-bg').click()">🖼️</button>
            <input type="file" id="local-bg" accept="image/*" style="display:none;" onchange="uploadBg(this)">
        </div>
    </div>
</div>

<div id="win-screen" class="overlay">
    <h1 style="color:var(--gold); font-size:2rem; margin:0;">CASE CLOSED</h1>
    <button class="btn" style="background:var(--gold); color:black; width:150px; margin-top:20px;" onclick="closeOverlay('win-screen')">RETURN</button>
</div>

<div id="kill-screen" class="overlay">
    <h1 style="color:#ff0000; font-size:2.5rem; font-family:monospace; margin:0;">ELIMINATED</h1>
    <button class="btn" style="background:#222; color:red; border:1px solid red; width:150px; margin-top:20px;" onclick="closeOverlay('kill-screen')">RESURRECT</button>
</div>

<div class="container" id="main-content">
    
    <div class="setup">
        <div class="setup-label">PLAYER ID</div>
        <input type="text" id="p1" placeholder="P1" maxlength="3" oninput="syncNames()">
        <input type="text" id="p2" placeholder="P2" maxlength="3" oninput="syncNames()">
        <input type="text" id="p3" placeholder="P3" maxlength="3" oninput="syncNames()">
        <input type="text" id="p4" placeholder="P4" maxlength="3" oninput="syncNames()">
        <input type="text" id="p5" placeholder="P5" maxlength="3" oninput="syncNames()">
        <input type="text" id="p6" placeholder="P6" maxlength="3" oninput="syncNames()">
        <div style="background:rgba(255,255,255,0.05); border-left:1px solid #333;"></div>
    </div>

    <div id="sheet">
        <div class="section-header">WHO</div>
        <table id="table-who"><thead><tr><th class="name-col">IDENTITY</th><th class="h-p1 player-col">P1</th><th class="h-p2 player-col">P2</th><th class="h-p3 player-col">P3</th><th class="h-p4 player-col">P4</th><th class="h-p5 player-col">P5</th><th class="h-p6 player-col">P6</th><th class="file-col">FILE</th></tr></thead><tbody id="body-who"></tbody></table>
        <div class="section-header">WHAT</div>
        <table id="table-what"><tbody id="body-what"></tbody></table>
        <div class="section-header">WHERE</div>
        <table id="table-where"><tbody id="body-where"></tbody></table>
    </div>

    <textarea id="turn-history" placeholder="Evidence Notes..." oninput="localStorage.setItem('turnHistory', this.value)"></textarea>
    
    <button class="btn" style="width:calc(100% - 20px); background:transparent; color:#444; margin:10px; border:1px solid #222;" onclick="if(confirm('Clear data?')) { localStorage.clear(); location.reload(); }">WIPE ALL EVIDENCE</button>

    <footer>
        <p>CLUEDO TRACKER v2.9.2 | © 2026</p>
    </footer>
</div>

<script>
    const data = {
        who: ["Miss Scarlett", "Col. Mustard", "Dr. Orchid", "Rev. Green", "Mrs. Peacock", "Prof. Plum"],
        what: ["Candlestick", "Dagger", "Lead Pipe", "Revolver", "Rope", "Wrench"],
        where: ["Ballroom", "Billiard Room", "Conservatory", "Dining Room", "Hall", "Kitchen", "Library", "Lounge", "Study"]
    };

    function triggerEnd(type) { document.getElementById(type === 'win' ? 'win-screen' : 'kill-screen').style.display = 'flex'; }
    function closeOverlay(id) { document.getElementById(id).style.display = 'none'; }

    function uploadBg(input) {
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = function(e) {
                document.getElementById('bg-layer').style.backgroundImage = `url('${e.target.result}')`;
                try { localStorage.setItem('customBg', e.target.result); } catch(e) { alert("Image too large!"); }
            };
            reader.readAsDataURL(input.files[0]);
        }
    }

    function updateBlur(val) {
        document.getElementById('bg-layer').style.filter = `blur(${val}px)`;
        localStorage.setItem('bgBlur', val);
    }

    function toggleSecret(isOn) {
        const content = document.getElementById('main-content');
        isOn ? content.classList.add('secret-blur') : content.classList.remove('secret-blur');
        localStorage.setItem('secretMode', isOn);
    }

    function syncNames() {
        for(let i=1; i<=6; i++) {
            const name = document.getElementById(`p${i}`).value.toUpperCase();
            document.querySelectorAll(`.h-p${i}`).forEach(el => el.innerText = name || `P${i}`);
            localStorage.setItem(`p${i}name`, name);
        }
    }

    function buildRows(list, bodyId) {
        const body = document.getElementById(bodyId);
        list.forEach((item, rowIdx) => {
            const tr = document.createElement('tr');
            let html = `<td class="name-col">${item}</td>`;
            for(let colIdx=1; colIdx<=7; colIdx++) {
                const id = `${bodyId}-${rowIdx}-${colIdx}`;
                const saved = localStorage.getItem(id) || '-';
                html += `<td id="${id}" class="cell ${getStateClass(saved)}" onclick="toggle(this)">${saved}</td>`;
            }
            tr.innerHTML = html;
            body.appendChild(tr);
        });
    }

    function getStateClass(text) {
        return text === 'X' ? 'state-x' : text === '?' ? 'state-maybe' : text === '✔' ? 'state-check' : 'state-none';
    }

    function toggle(el) {
        const states = ['-', 'X', '?', '✔'];
        let nextIdx = (states.indexOf(el.innerText) + 1) % states.length;
        el.innerText = states[nextIdx];
        el.className = `cell ${getStateClass(states[nextIdx])}`;
        localStorage.setItem(el.id, states[nextIdx]);
    }

    buildRows(data.who, 'body-who');
    buildRows(data.what, 'body-what');
    buildRows(data.where, 'body-where');

    const savedBg = localStorage.getItem('customBg');
    if(savedBg) document.getElementById('bg-layer').style.backgroundImage = `url('${savedBg}')`;
    const savedBlur = localStorage.getItem('bgBlur') || 0;
    document.getElementById('blur-slider').value = savedBlur;
    updateBlur(savedBlur);
    const savedNotes = localStorage.getItem('turnHistory');
    if(savedNotes) document.getElementById('turn-history').value = savedNotes;
    const secretOn = localStorage.getItem('secretMode') === 'true';
    document.getElementById('secret-toggle').checked = secretOn;
    toggleSecret(secretOn);

    for(let i=1; i<=6; i++) {
        const sn = localStorage.getItem(`p${i}name`);
        if(sn) document.getElementById(`p${i}`).value = sn;
    }
    syncNames();
</script>
</body>
</html>
