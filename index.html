<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cluedo Ultimate Tracker</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🕵️‍♂️</text></svg>">
    
    <style>
        :root { --gold: #d4af37; --glass: rgba(0, 0, 0, 0.85); --blood: #8b0000; }
        
        body { 
            font-family: 'Georgia', serif; margin: 0; padding: 15px; min-height: 100dvh;
            background-color: #1a1a1a; overflow-x: hidden; color: #eee;
        }

        #bg-layer {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1; background-size: cover; background-position: center;
            transition: filter 0.3s ease;
        }

        .container { max-width: 900px; margin: auto; transition: filter 0.4s ease, opacity 0.4s ease; }
        .secret-blur { filter: blur(50px) grayscale(1) !important; opacity: 0 !important; pointer-events: none !important; }

        /* HUD Controls */
        .controls { background: var(--glass); padding: 15px; border-radius: 10px; margin-bottom: 15px; border: 1px solid var(--gold); }
        .secret-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        
        /* Toggle Switch */
        .switch { position: relative; display: inline-block; width: 50px; height: 24px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #333; transition: .4s; border-radius: 24px; border: 1px solid var(--gold); }
        .slider:before { position: absolute; content: ""; height: 16px; width: 16px; left: 4px; bottom: 3px; background-color: var(--gold); transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: var(--blood); }
        input:checked + .slider:before { transform: translateX(24px); background-color: #fff; }

        /* Inputs */
        .setup { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 15px; }
        .setup input { background: var(--glass); border: 1px solid #444; color: white; padding: 8px; text-align: center; border-radius: 4px; font-size: 0.8em; width: 100%; box-sizing: border-box; }

        /* Tables */
        table { width: 100%; border-collapse: collapse; margin-bottom: 25px; background: var(--glass); backdrop-filter: blur(5px); border: 1px solid #444; }
        th, td { border: 1px solid rgba(255,255,255,0.1); padding: 12px 2px; text-align: center; }
        .name-col { width: 32%; text-align: left; padding-left: 10px; font-weight: bold; color: var(--gold); font-size: 0.85em; }
        .cell { cursor: pointer; user-select: none; font-weight: bold; font-size: 1.1em; }
        .state-x { color: #ff4d4d; }
        .state-maybe { color: var(--gold); }
        .state-check { color: #00ff88; }

        .section-header { background: rgba(139, 0, 0, 0.9); color: var(--gold); padding: 10px; font-weight: bold; text-transform: uppercase; border: 1px solid var(--gold); font-size: 0.9em; }
        .btn { padding: 12px; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; text-transform: uppercase; font-size: 0.8em; }
        .btn-win { background: #28a745; color: white; border: 2px solid #00ff88; }
        .btn-lose { background: var(--blood); color: white; border: 2px solid #ff4d4d; }
        .btn-file { background: #444; color: var(--gold); border: 1px solid var(--gold); }
        
        textarea { width: 100%; height: 80px; background: var(--glass); color: #ccc; border: 1px solid #444; padding: 10px; box-sizing: border-box; border-radius: 5px; resize: none; font-size: 0.9em; }
        footer { text-align: center; padding: 30px; color: #666; font-size: 0.7em; letter-spacing: 1px; }

        /* MOBILE OPTIMIZED OVERLAYS - FIXED FOR 100DVH */
        .overlay {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100dvh;
            display: none; flex-direction: column; align-items: center; justify-content: center;
            z-index: 9999; text-align: center; padding: env(safe-area-inset-top) 20px env(safe-area-inset-bottom) 20px;
            box-sizing: border-box; backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
        }

        #win-screen { background: radial-gradient(circle, #1a1a1a 0%, #000 100%); border: 6px double var(--gold); }
        #win-screen h1 { color: var(--gold); font-size: clamp(1.8rem, 8vw, 3.5rem); margin: 0 0 10px 0; text-shadow: 0 0 15px var(--gold); animation: shimmer 2s infinite; }
        
        #kill-screen { background: #000; border: 4px solid #300; }
        #kill-screen h1 { color: #ff0000; font-size: clamp(2.2rem, 10vw, 4rem); font-family: 'Courier New', monospace; letter-spacing: -1px; margin: 0 0 10px 0; animation: shake 0.5s infinite; }
        
        .overlay p { color: #bbb; font-size: clamp(0.85rem, 4vw, 1.1rem); max-width: 300px; margin: 0 0 30px 0; line-height: 1.4; }
        .overlay .btn { min-width: 180px; padding: 18px; font-size: 0.9rem; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }

        @keyframes shimmer { 0%, 100% { opacity: 0.8; } 50% { opacity: 1; transform: scale(1.02); } }
        @keyframes shake { 0% { transform: translate(1px, 1px); } 50% { transform: translate(-1px, -2px); } 100% { transform: translate(1px, 1px); } }
        @keyframes drip { 0% { transform: translateY(-10px); opacity: 0; } 50% { opacity: 1; } 100% { transform: translateY(40dvh); opacity: 0; } }
        .blood-drip { color: #ff0000; font-size: 2.5rem; animation: drip 2.5s infinite; position: absolute; top: 10%; }
    </style>
</head>
<body>

<div id="bg-layer"></div>

<div id="win-screen" class="overlay">
    <h1>CASE CLOSED</h1>
    <p id="win-msg">The truth has been brought to light.</p>
    <button class="btn" style="background:var(--gold); color:black;" onclick="closeOverlay('win-screen')">RETURN TO LOG</button>
</div>

<div id="kill-screen" class="overlay">
    <div class="blood-drip">🩸</div>
    <h1>YOU'RE NEXT</h1>
    <p id="kill-msg">A false accusation was your final mistake.</p>
    <button class="btn" style="background:#222; color:red; border:1px solid red;" onclick="closeOverlay('kill-screen')">TRY AGAIN</button>
</div>

<div class="controls" style="max-width: 900px; margin: auto; position: relative; z-index: 10;">
    <div class="secret-header">
        <strong style="color:var(--gold)">INVESTIGATOR HUD</strong>
        <div style="display: flex; align-items: center; gap: 10px;">
            <span style="font-size: 0.65em; letter-spacing: 1px;">STEALTH MODE</span>
            <label class="switch">
                <input type="checkbox" id="secret-toggle" onchange="toggleSecret(this.checked)">
                <span class="slider"></span>
            </label>
        </div>
    </div>
    
    <div style="display: flex; align-items: center; gap: 10px; margin-top:10px;">
        <span style="font-size:0.75em; color:var(--gold)">Blur:</span>
        <input type="range" id="blur-slider" min="0" max="25" value="0" style="flex-grow:1" oninput="updateBlur(this.value)">
        <button class="btn btn-file" onclick="document.getElementById('local-bg').click()">🖼️ BG</button>
        <input type="file" id="local-bg" accept="image/*" style="display:none;" onchange="uploadBg(this)">
    </div>

    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px;">
        <button class="btn btn-win" onclick="triggerEnd('win')">SOLVE ✔</button>
        <button class="btn btn-lose" onclick="triggerEnd('kill')">GUESSED WRONG 💀</button>
    </div>
</div>

<div class="container" id="main-content">
    <div class="setup">
        <input type="text" id="p1" placeholder="P1" oninput="syncNames()">
        <input type="text" id="p2" placeholder="P2" oninput="syncNames()">
        <input type="text" id="p3" placeholder="P3" oninput="syncNames()">
        <input type="text" id="p4" placeholder="P4" oninput="syncNames()">
        <input type="text" id="p5" placeholder="P5" oninput="syncNames()">
        <input type="text" id="p6" placeholder="P6" oninput="syncNames()">
    </div>

    <div id="sheet">
        <div class="section-header">WHO</div>
        <table id="table-who"><thead><tr><th class="name-col">Identity</th><th class="h-p1">P1</th><th class="h-p2">P2</th><th class="h-p3">P3</th><th class="h-p4">P4</th><th class="h-p5">P5</th><th class="h-p6">P6</th><th>File</th></tr></thead><tbody id="body-who"></tbody></table>
        <div class="section-header">WHAT</div>
        <table id="table-what"><tbody id="body-what"></tbody></table>
        <div class="section-header">WHERE</div>
        <table id="table-where"><tbody id="body-where"></tbody></table>
    </div>

    <textarea id="turn-history" placeholder="Turn History & Notes..." oninput="localStorage.setItem('turnHistory', this.value)"></textarea>
    <button class="btn" style="width:100%; background:#333; color:#777; margin-top:15px; border:1px solid #444;" onclick="if(confirm('Wipe everything?')) { localStorage.clear(); location.reload(); }">NEW GAME</button>

    <footer>
        <p>CLUEDO DIGITAL TRACKER (DR. ORCHID EDITION)</p>
        <p>© 2026 | VERSION 2.7.5 | MIT LICENSE</p>
    </footer>
</div>

<script>
    const data = {
        who: ["Miss Scarlett", "Col. Mustard", "Dr. Orchid", "Rev. Green", "Mrs. Peacock", "Prof. Plum"],
        what: ["Candlestick", "Dagger", "Lead Pipe", "Revolver", "Rope", "Spanner"],
        where: ["Ballroom", "Billiard Room", "Conservatory", "Dining Room", "Hall", "Kitchen", "Library", "Lounge", "Study"]
    };

    const winMsgs = [
        "Brilliant deduction! The killer has been apprehended.",
        "The truth has been brought to light. Tudor Mansion is safe...",
        "Case closed. You've outsmarted the mansion's guests.",
        "Justice is served. Another mystery solved."
    ];

    const killMsgs = [
        "A false accusation was your final mistake.",
        "The killer remains at large. You are next.",
        "Silence is the only witness left.",
        "Wrong guesses can be... fatal."
    ];

    function triggerEnd(type) {
        if(type === 'win') {
            document.getElementById('win-msg').innerText = winMsgs[Math.floor(Math.random() * winMsgs.length)];
            document.getElementById('win-screen').style.display = 'flex';
        } else {
            document.getElementById('kill-msg').innerText = killMsgs[Math.floor(Math.random() * killMsgs.length)];
            document.getElementById('kill-screen').style.display = 'flex';
        }
    }

    function closeOverlay(id) { document.getElementById(id).style.display = 'none'; }

    function uploadBg(input) {
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = function(e) {
                document.getElementById('bg-layer').style.backgroundImage = `url('${e.target.result}')`;
                try { localStorage.setItem('customBg', e.target.result); } catch(e) { alert("File too large!"); }
            };
            reader.readAsDataURL(input.files[0]);
        }
    }

    function updateBlur(val) {
        document.getElementById('bg-layer').style.filter = `blur(${val}px)`;
        localStorage.setItem('bgBlur', val);
    }

    function toggleSecret(isOn) {
        const content = document.getElementById('main-content');
        isOn ? content.classList.add('secret-blur') : content.classList.remove('secret-blur');
        localStorage.setItem('secretMode', isOn);
    }

    function syncNames() {
        for(let i=1; i<=6; i++) {
            const name = document.getElementById(`p${i}`).value;
            document.querySelectorAll(`.h-p${i}`).forEach(el => el.innerText = name || `P${i}`);
            localStorage.setItem(`p${i}name`, name);
        }
    }

    function buildRows(list, bodyId) {
        const body = document.getElementById(bodyId);
        list.forEach((item, rowIdx) => {
            const tr = document.createElement('tr');
            let html = `<td class="name-col">${item}</td>`;
            for(let colIdx=1; colIdx<=7; colIdx++) {
                const id = `${bodyId}-${rowIdx}-${colIdx}`;
                const saved = localStorage.getItem(id) || '-';
                html += `<td id="${id}" class="cell ${getStateClass(saved)}" onclick="toggle(this)">${saved}</td>`;
            }
            tr.innerHTML = html;
            body.appendChild(tr);
        });
    }

    function getStateClass(text) {
        return text === 'X' ? 'state-x' : text === '?' ? 'state-maybe' : text === '✔' ? 'state-check' : 'state-none';
    }

    function toggle(el) {
        const states = ['-', 'X', '?', '✔'];
        let nextIdx = (states.indexOf(el.innerText) + 1) % states.length;
        el.innerText = states[nextIdx];
        el.className = `cell ${getStateClass(states[nextIdx])}`;
        localStorage.setItem(el.id, states[nextIdx]);
    }

    buildRows(data.who, 'body-who');
    buildRows(data.what, 'body-what');
    buildRows(data.where, 'body-where');

    const savedBg = localStorage.getItem('customBg');
    if(savedBg) document.getElementById('bg-layer').style.backgroundImage = `url('${savedBg}')`;
    const savedBlur = localStorage.getItem('bgBlur') || 0;
    document.getElementById('blur-slider').value = savedBlur;
    updateBlur(savedBlur);
    const savedNotes = localStorage.getItem('turnHistory');
    if(savedNotes) document.getElementById('turn-history').value = savedNotes;
    const secretOn = localStorage.getItem('secretMode') === 'true';
    document.getElementById('secret-toggle').checked = secretOn;
    toggleSecret(secretOn);

    for(let i=1; i<=6; i++) {
        const sn = localStorage.getItem(`p${i}name`);
        if(sn) document.getElementById(`p${i}`).value = sn;
    }
    syncNames();
</script>
</body>
</html>
